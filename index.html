    <style>
        /* التنسيقات الأساسية */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e2f;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        
        .game-container {
            background-color: #2a2a40;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            text-align: center;
            width: 90%;
            max-width: 400px;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            margin: 20px 0;
            border-radius: 8px;
            border: 1px solid #3f3f5a;
            background-color: #1e1e2f;
            color: white;
            font-size: 16px;
            text-align: center;
            box-sizing: border-box;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #3498db;
        }

        /* تنسيقات الأزرار الأساسية */
        button, .link-btn {
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s;
            text-decoration: none; /* عشان الروابط متظهرش تحتها خط */
            display: inline-block; /* عشان تظبط مع الـ links */
            box-sizing: border-box;
        }
        
        button:active, .link-btn:active {
            transform: scale(0.95);
        }

        /* تنسيقات الأزرار في صفحة الدخول */
        .auth-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
        }

        #watchAdBtn { background-color: #f39c12; color: white; width: 100%; }
        #watchAdBtn:hover { background-color: #d68910; }

        /* أزرار السوشيال ميديا */
        .social-buttons {
            display: flex;
            gap: 10px;
            margin-top: 5px;
            width: 100%;
        }

        .youtube-btn { 
            background-color: #ff0000; 
            color: white; 
            flex: 1; 
        }
        .youtube-btn:hover { background-color: #cc0000; }

        .telegram-btn { 
            background-color: #0088cc; 
            color: white; 
            flex: 1; 
        }
        .telegram-btn:hover { background-color: #006699; }

        /* تنسيقات أزرار اللعبة */
        .buttons-wrapper {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 10px;
        }

        .buttons-wrapper button { flex: 1; }

        #revealBtn { background-color: #e74c3c; color: white; }
        #revealBtn:hover { background-color: #c0392b; }

        #resetBtn { background-color: #3498db; color: white; }
        #resetBtn:hover { background-color: #2980b9; }

        /* تنسيقات البوب أب (Popup) */
        .popup-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            display: none; 
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .popup-content {
            background-color: #2a2a40;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }

        .spinner {
            border: 5px solid #3f3f5a;
            border-top: 5px solid #3498db;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* حاوية الدوائر للعبة */
        .circles-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 30px 0;
            direction: ltr;
        }

        .circle {
            width: 60px;
            height: 60px;
            background-color: #3f3f5a;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 30px;
            transition: transform 0.3s ease, background-color 0.3s ease;
            box-shadow: inset 0 4px 6px rgba(0,0,0,0.3);
        }

        .circle.active {
            background-color: #4CAF50;
            transform: scale(1.15);
            box-shadow: 0 0 15px rgba(76, 175, 80, 0.6);
        }
    </style>
</head>
<body>

    <div id="authSection" class="game-container">
        <h2>تسجيل الدخول 🔐</h2>
        <p>برجاء إدخال الـ ID الخاص بك للبدء</p>
        <input type="text" id="userId" placeholder="اكتب الـ ID الخاص بك هنا" required>
        
        <div class="auth-buttons">
            <button id="watchAdBtn" onclick="startAdProcess()">شاهد إعلان لتستطيع استعمال الأداة 📺</button>
            
            <div class="social-buttons">
                <a href="https://www.youtube.com/@BAZOKA1xBet" target="_blank" class="link-btn youtube-btn">يوتيوب ▶️</a>
                
                <a href="https://t.me/bazokamelbet" target="_blank" class="link-btn telegram-btn">تليجرام ✈️</a>
            </div>
        </div>
    </div>

    <div id="popupOverlay" class="popup-overlay">
        <div class="popup-content">
            <div class="spinner"></div>
            <h3 id="popupText">انتظر، يتم الاتصال بالسيرفر... ⏳</h3>
        </div>
    </div>

    <div id="gameSection" class="game-container" style="display: none;">
        <h2>سكربت التفاحة 🍎</h2>
        <p>اضغط على إظهار التفاحة عشان تشوف هتنزل فين!</p>
        
        <div class="circles-container" id="circles">
            <div class="circle"></div>
            <div class="circle"></div>
            <div class="circle"></div>
            <div class="circle"></div>
            <div class="circle"></div>
        </div>

        <div class="buttons-wrapper">
            <button id="revealBtn" onclick="revealApple()">إظهار التفاحة 🍎</button>
            <button id="resetBtn" onclick="resetGame()">جولة جديدة 🔄</button>
        </div>
    </div>

    <script>
        function startAdProcess() {
            const userIdInput = document.getElementById('userId').value.trim();
            
            if (userIdInput === "") {
                alert("لازم تكتب الـ ID بتاعك الأول عشان تقدر تكمل!");
                return;
            }

            const monetagLink = "https://omg10.com/4/10692014"; 
            
            window.open(monetagLink, '_blank');
            document.getElementById('popupOverlay').style.display = 'flex';

            setTimeout(() => {
                document.getElementById('popupOverlay').style.display = 'none';
                document.getElementById('authSection').style.display = 'none';
                document.getElementById('gameSection').style.display = 'block';
            }, 8000); 
        }

        const circles = document.querySelectorAll('.circle');
        let isAppleRevealed = false;

        function revealApple() {
            circles.forEach(circle => {
                circle.innerHTML = '';
                circle.classList.remove('active');
            });

            const randomIndex = Math.floor(Math.random() * 5);
            circles[randomIndex].innerHTML = '🍎';
            circles[randomIndex].classList.add('active');
            
            isAppleRevealed = true;
        }

        function resetGame() {
            if (!isAppleRevealed) {
                alert("أنت في جولة بالفعل! برجاء الضغط على 'إظهار التفاحة' أولاً.");
                return; 
            }

            circles.forEach(circle => {
                circle.innerHTML = '';
                circle.classList.remove('active');
            });
            
            isAppleRevealed = false;
        }
    </script>

</body>
